function migrateData(d){
  if(d._version>=3)return d;
  let tasks=(d.tasks||[]).map(t=>({...t,userId:t.userId||'stephen'}));
  let callLog=(d.callLog||[]).map(l=>({...l,userId:l.userId||'stephen'}));

    const cts=(co.contacts||[]).map(ct=>({...ct,userId:ct.userId||'stephen'}));
    const hasActivity=cts.some(ct=>ct.contacted);
    return{...co,contacts:cts,
      enrichedDate:co.enrichedDate||((co.notes||'').length>50?co.updatedAt||new Date().toISOString():null),
      claimedBy:co.claimedBy||(hasActivity?'stephen':cts.length>0?'stephen':null),
      claimDate:co.claimDate||(hasActivity?co.updatedAt||new Date().toISOString():cts.length>0?co.updatedAt||new Date().toISOString():null)};
  });
  let activity=d.activity||{};
  if(!activity.stephen&&!activity.thomas){activity={stephen:activity,thomas:{}};}
  return{...d,companies,tasks,callLog,activity,_version:3};

function isOD(d){return d&&d<td()}
function isT(d){return d===td()}
function isS(d){if(!d)return false;const x=(new Date(d)-new Date(td()))/864e5;return x>=0&&x<=2}
function daysFromNow(d){if(!d)return 999;return Math.round((new Date(d)-new Date(td()))/864e5)}

function logActAtomic(data,uid,type,companyId){
  const today=td();const act={...data.activity};
  if(!act[uid])act[uid]={};
  const ua={...act[uid]};
  if(!ua[today])ua[today]={companies:[],emails:0,linkedin:0,calls:0};
  const d={...ua[today]};
  if(type==='company'&&companyId&&!(d.companies||[]).includes(companyId))d.companies=[...(d.companies||[]),companyId];
  if(type==='email')d.emails=(d.emails||0)+1;
  if(type==='linkedin')d.linkedin=(d.linkedin||0)+1;
  if(type==='call')d.calls=(d.calls||0)+1;
  if(type==='conversation')d.conversations=(d.conversations||0)+1;
  ua[today]=d;act[uid]=ua;return act;
}

// ─── COMPANY CLAIMING ───
// A company is locked ONLY if it has been actually contacted (any contact marked contacted)
// Otherwise Thomas can freely access it regardless of claimedBy
function hasBeenActuallyContacted(company){
  return (company.contacts||[]).some(c=>c.contacted);
}

function getClaimStatus(company,uid){
  // If no contacts have been actually contacted, it's free for anyone
  if(!hasBeenActuallyContacted(company)){
    if(!company.claimedBy||company.claimedBy===uid)return{status:'mine',claimedBy:company.claimedBy||uid,months:0,stale:false};
    return{status:'free',claimedBy:null,months:0};
  }
  // Someone has actually contacted people here — now enforce claim rules
  if(!company.claimedBy)return{status:'free',claimedBy:null,months:0};
  const ms=Math.round((new Date()-new Date(company.claimDate||company.updatedAt))/(1000*60*60*24*30.44));
  if(company.claimedBy===uid)return{status:'mine',claimedBy:company.claimedBy,months:ms,stale:ms>=3};
  if(ms<3)return{status:'locked',claimedBy:company.claimedBy,months:ms};
  if(ms<6)return{status:'stale',claimedBy:company.claimedBy,months:ms};
  return{status:'expired',claimedBy:company.claimedBy,months:ms};
}

function StreakLeaderboard({data}){
  const today=td();
  const stats=Object.values(USERS).map(u=>{
    let streak=0;const ck=new Date();const a=getAct(data,u.id,today);
    const ts=a.companies.length+a.emails+a.linkedin;if(ts===0)ck.setDate(ck.getDate()-1);
    for(let i=0;i<180;i++){const ds=ck.toISOString().split('T')[0];const dw=ck.getDay();if(dw===0||dw===6){ck.setDate(ck.getDate()-1);continue}const da=getAct(data,u.id,ds);if(da.companies.length>0||da.emails>0||da.linkedin>0){streak++;ck.setDate(ck.getDate()-1)}else break}
    const ws=new Date();ws.setDate(ws.getDate()-(ws.getDay()||7)+1);let wE=0,wL=0,wC=0;
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const da=getAct(data,u.id,d.toISOString().split('T')[0]);wC+=da.companies.length;wE+=da.emails;wL+=da.linkedin}
    const tot=a.companies.length+a.emails+a.linkedin;
    const tgt=u.targets.companies+u.targets.emails+u.targets.linkedin;
    const win=tot>=tgt;
    return{...u,streak,wE,wL,wC,win,todayDone:tot,todayTarget:tgt};
  }).sort((a,b)=>b.streak-a.streak);
  const leader=stats[0];const other=stats[1];
  const gap=leader.streak-other.streak;
  return(<div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:12,padding:20,marginBottom:24}}>
    <div className="sh" style={{color:'var(--amber)',marginBottom:16}}>🏆 STREAK LEADERBOARD</div>
    <div style={{display:'flex',gap:12,marginBottom:16}}>
      {stats.map((s,i)=>(
        <div key={s.id} style={{flex:1,background:i===0?s.color+'11':'var(--bg1)',border:`1px solid ${i===0?s.color+'44':'var(--bd)'}`,borderRadius:10,padding:16,position:'relative',overflow:'hidden'}}>
          {i===0&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${s.color},${s.color}88)`}}/>}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:32,height:32,borderRadius:'50%',background:s.color+'22',border:`2px solid ${s.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:s.color}} className="mono">{s.initials}</div>
              <div><div style={{fontWeight:600,fontSize:14}}>{s.name}</div>{i===0&&<div className="mono" style={{fontSize:9,color:s.color,letterSpacing:1}}>LEADING</div>}</div>
            </div>
            {s.win&&<span style={{fontSize:18}} title="Targets hit today">🔥</span>}
          </div>
          <div style={{display:'flex',align:'center',gap:4,marginBottom:10}}>
            <span className="mono" style={{fontSize:32,fontWeight:700,color:s.color,lineHeight:1}}>{s.streak}</span>
            <span style={{fontSize:11,color:'var(--tm)',alignSelf:'flex-end',marginBottom:4,marginLeft:4}}>day streak</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4}}>
            {[{l:'CO',v:s.wC},{l:'EM',v:s.wE},{l:'LI',v:s.wL}].map(r=>(
              <div key={r.l} style={{background:'var(--bg0)',borderRadius:6,padding:'6px 8px',textAlign:'center'}}>
                <div className="mono" style={{fontSize:14,fontWeight:700,color:s.color}}>{r.v}</div>
                <div className="mono" style={{fontSize:9,color:'var(--tm)'}}>{r.l}</div>
              </div>
            ))}
          </div>
          <div className="mono" style={{fontSize:10,color:'var(--tm)',marginTop:8,textAlign:'center'}}>this week</div>
        </div>
      ))}
    </div>
    <div style={{padding:'10px 14px',background:'var(--bg0)',borderRadius:8,border:'1px solid var(--bd)'}}>
      {gap===0
        ?<span style={{fontSize:12,color:'var(--tm)'}} className="mono">⚖ Even — neck and neck. Who breaks first?</span>
        :<span style={{fontSize:12,color:'var(--tm)'}} className="mono">
          <span style={{color:leader.color,fontWeight:700}}>{leader.name}</span> leads by {gap} day{gap!==1?'s':''} — {gap>=5?'dominant run 🔥':gap>=3?'building momentum ↗':'close race ⚡'}
        </span>}
    </div>
  </div>);
}

function DailyActions({data,setData,setView,setSel,uid}){
  const [emailM,setEmailM]=useState(null);const [callM,setCallM]=useState(null);const recent=getRecent();
  const open=data.tasks.filter(t=>!t.completed&&t.userId===uid).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const overdue=open.filter(t=>isOD(t.dueDate));const todayT=open.filter(t=>isT(t.dueDate));const upcoming=open.filter(t=>!isOD(t.dueDate)&&!isT(t.dueDate)&&isS(t.dueDate));

  function handleSent(ct,taskId,wasFU){
    const co=data.companies.find(c=>c.contacts?.some(x=>x.id===ct.id));if(!co)return;
    const act=logActAtomic(data,uid,'email');
    const uCo=data.companies.map(c=>{if(c.id!==co.id)return c;return{...c,status:c.status==='prospect'?'contacted':c.status,claimedBy:uid,claimDate:new Date().toISOString(),updatedAt:new Date().toISOString(),contacts:c.contacts.map(x=>x.id===ct.id?{...x,contacted:true,contactMethod:'email',contactDate:td(),lastContactDate:td()}:x)}});
    let uT=taskId?data.tasks.map(t=>t.id===taskId?{...t,completed:true,completedDate:new Date().toISOString()}:t):[...data.tasks];
    // Only create follow-up task if this was email 1 (not already a follow-up)
    if(!wasFU){
      uT.push({id:gid(),companyId:co.id,contactId:ct.id,userId:uid,type:'followup',description:`Follow up with ${ct.name} at ${co.name}`,dueDate:fd(4),completed:false,createdAt:new Date().toISOString()});
    }
    const u={...data,companies:uCo,tasks:uT,activity:act};setData(u);sv(u);setEmailM(null);
    setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),100);
  }
  function handleCall(ct,outcome,notes,taskId){
    const co=data.companies.find(c=>c.contacts?.some(x=>x.id===ct.id));if(!co)return;
    const log={id:gid(),companyId:co.id,contactId:ct.id,contactName:ct.name,companyName:co.name,outcome,notes,userId:uid,date:new Date().toISOString()};
    const act=logActAtomic(data,uid,'call');
    const uCo=data.companies.map(c=>{if(c.id!==co.id)return c;return{...c,status:c.status==='prospect'?'contacted':c.status,claimedBy:uid,claimDate:new Date().toISOString(),updatedAt:new Date().toISOString(),contacts:c.contacts.map(x=>x.id===ct.id?{...x,contacted:true,contactMethod:'call',contactDate:td(),lastContactDate:td(),lastCallOutcome:outcome,lastCallNotes:notes}:x)}});
    const days=outcome==='spoke'?5:outcome==='voicemail'?3:2;
    let uT=taskId?data.tasks.map(t=>t.id===taskId?{...t,completed:true,completedDate:new Date().toISOString()}:t):[...data.tasks];
    uT.push({id:gid(),companyId:co.id,contactId:ct.id,userId:uid,type:outcome==='spoke'?'followup':'call',description:outcome==='spoke'?`Follow up after call with ${ct.name} at ${co.name}`:`Re-call ${ct.name} at ${co.name} (${outcome})`,dueDate:fd(days),completed:false,createdAt:new Date().toISOString()});
    const u={...data,companies:uCo,tasks:uT,callLog:[...(data.callLog||[]),log],activity:act};setData(u);sv(u);setCallM(null);
  }
  function complete(id){const u={...data,tasks:data.tasks.map(t=>t.id===id?{...t,completed:true,completedDate:new Date().toISOString()}:t)};setData(u);sv(u)}
  function logConv(type){const act=logActAtomic(data,uid,type);const u={...data,activity:act};setData(u);sv(u);}

  function TR({task}){
    const co=data.companies.find(c=>c.id===task.companyId);
    const ct=co?.contacts?.find(c=>c.id===task.contactId);
    const isFU=task.type==='followup';
    const emailCount=ct?getEmailSentCount(data,ct.id,uid):0;
    const emailsDone=emailCount>=2;
    return(<div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid var(--bd)',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bgh)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      <span style={{fontSize:16,color:task.type==='call'?'var(--green)':task.type==='email'?'var(--blue)':'var(--purple)',width:24,textAlign:'center'}}>{task.type==='call'?'☎':task.type==='email'?'✉':'◇'}</span>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500}}>{task.description}</div><div style={{fontSize:11,color:'var(--tm)',marginTop:2}}>{co&&<span onClick={()=>{addRecent(co.id,co.name);setSel(co.id);setView('companyDetail')}} style={{cursor:'pointer',color:'var(--amber)'}}>{co.name}</span>}{ct&&<span> · {ct.name}{ct.phone&&<span className="mono" style={{marginLeft:6,color:'var(--tm)'}}>{ct.phone}</span>}</span>}</div></div>
      <span className="mono" style={{fontSize:11,color:isOD(task.dueDate)?'var(--red)':isT(task.dueDate)?'var(--amber)':'var(--tm)',whiteSpace:'nowrap'}}>{isOD(task.dueDate)?'OVERDUE':isT(task.dueDate)?'TODAY':fmt(task.dueDate)}</span>
      <div style={{display:'flex',gap:4}}>
        {ct?.email&&!emailsDone&&<button className={isFU?'bpu bx':'bb bx'} onClick={()=>setEmailM({contact:ct,company:co,taskId:task.id,isFollowUp:isFU,emailCount})}>
          {isFU?'◇ Follow-up':'✉ Email'}
        </button>}
        {ct?.email&&emailsDone&&<span className="mono" style={{fontSize:10,color:'var(--tm)',padding:'2px 6px'}}>Max emails sent</span>}
        {ct&&<button className="bg bx" onClick={()=>setCallM({contact:ct,company:co,taskId:task.id})}>☎</button>}
        <button className="bs bx" onClick={()=>complete(task.id)}>✓</button>
      </div>
    </div>)
  }

  const todayAct=getAct(data,uid,td());
  const totalDone=todayAct.companies.length+todayAct.emails+todayAct.linkedin;
  const totalTarget=USERS[uid].targets.companies+USERS[uid].targets.emails+USERS[uid].targets.linkedin;
  const remaining=Math.max(0,totalTarget-totalDone);
  const win=totalDone>=totalTarget;
  const pct=Math.min(Math.round(totalDone/totalTarget*100),100);
  const nextTask=[...overdue,...todayT][0];
  const todayConvs=(todayAct.conversations||0);

  return(<div className="fi">
    <h2 style={{fontSize:22,fontWeight:300,marginBottom:4}}><span style={{color:'var(--amber)'}} className="mono">⚡</span> Daily Actions</h2>
    <p style={{color:'var(--tm)',fontSize:13,marginBottom:16}}>{new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
    <div style={{background:win?'var(--greend)':'var(--bgc)',border:`1px solid ${win?'var(--green)44':'var(--bd)'}`,borderRadius:12,padding:'16px 20px',marginBottom:16,transition:'all .4s'}}>
      {win?(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div><div className="mono" style={{fontSize:18,fontWeight:700,color:'var(--green)'}}>🔥 Targets Hit — Good Day</div><div style={{fontSize:12,color:'var(--green)',opacity:.8,marginTop:4}}>{totalDone}/{totalTarget} actions complete</div></div>
          <div style={{fontSize:36,lineHeight:1}}>✓</div>
        </div>
      ):(
        <div style={{display:'flex',alignItems:'center',gap:20}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
              <span className="mono" style={{fontSize:18,fontWeight:700,color:'var(--amber)'}}>{totalDone}<span style={{fontSize:13,color:'var(--tm)'}}>/{totalTarget}</span></span>
              <span style={{fontSize:12,color:'var(--tm)'}}>{remaining} left to win the day</span>
            </div>
            <div style={{height:8,background:'var(--bg2)',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:4,width:`${pct}%`,background:pct>=66?'var(--green)':pct>=33?'var(--amber)':'var(--red)',transition:'width .5s ease'}}/>
            </div>
          </div>
          <div className="mono" style={{fontSize:24,fontWeight:700,color:pct>=66?'var(--green)':pct>=33?'var(--amber)':'var(--t2)',minWidth:48,textAlign:'center'}}>{pct}%</div>
        </div>

  }
  const countries=[...new Set(data.companies.map(c=>c.country))].sort();const cc={};data.companies.forEach(c=>{cc[c.country]=(cc[c.country]||0)+1});

  const tp=Math.ceil(filtered.length/PS);const paged=filtered.slice(page*PS,(page+1)*PS);

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:13}}>{bulkE.running?<span>Enriching: <strong>{bulkE.current}</strong></span>:<span style={{color:'var(--green)'}}>✓ {bulkE.current}</span>}</span>
        <span className="mono" style={{fontSize:12,color:'var(--t2)'}}>{bulkE.done}/{bulkE.total}{bulkE.errors>0&&<span style={{color:'var(--red)',marginLeft:8}}>{bulkE.errors} errors</span>}</span>

    </div>}

    <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>{countries.map(c=><button key={c} className={fC===c?'bp':'bs'} style={{padding:'3px 10px',fontSize:11}} onClick={()=>setFC(fC===c?'':c)}>{c} ({cc[c]})</button>)}</div>
    <div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'60px 2fr 70px 100px 200px 40px',padding:'10px 16px',background:'var(--bg2)',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--tm)'}} className="mono"><span>Priority</span><span>Company</span><span>Country</span><span>Status</span><span>Contacts</span><span></span></div>

        function setStar(v){const u={...data,companies:data.companies.map(x=>x.id===c.id?{...x,priority:v,avoided:false}:x)};setData(u);sv(u)}

function CompanyDetail({cid,data,setData,setView,uid}){
  const company=data.companies.find(c=>c.id===cid);
  const [showAddCt,setShowAddCt]=useState(false);const [emailM,setEmailM]=useState(null);const [callM,setCallM]=useState(null);
  const [liM,setLiM]=useState(null); // LinkedIn connect modal
  const [newsLoad,setNewsLoad]=useState(false);const [justAdded,setJustAdded]=useState(null);

  if(!company)return<div style={{color:'var(--tm)'}}>Not found</div>;
  useEffect(()=>{addRecent(cid,company.name)},[cid]);
  function upCo(u){const ud={...data,companies:data.companies.map(c=>c.id===cid?{...c,...u,updatedAt:new Date().toISOString()}:c)};setData(ud);sv(ud)}
  function upCt(ctid,u){upCo({contacts:company.contacts.map(c=>c.id===ctid?{...c,...u}:c)})}
  function delCt(ctid){if(!confirm('Delete?'))return;upCo({contacts:company.contacts.filter(c=>c.id!==ctid)});if(justAdded===ctid)setJustAdded(null)}
  function addCt(){if(!ctForm.name.trim())return;const newId=gid();const nc={id:newId,...ctForm,userId:uid,contacted:false,contactMethod:'',contactDate:'',lastContactDate:''};let newTasks=[...data.tasks];if(ctForm.email||ctForm.phone){const sd=getStaggerDate(company.id,data.tasks,uid);newTasks.push({id:gid(),companyId:company.id,contactId:newId,userId:uid,type:'email',description:`Initial outreach to ${ctForm.name} at ${company.name}`,dueDate:sd,completed:false,createdAt:new Date().toISOString()})}
    const act=logActAtomic(data,uid,'company',company.id);
    const uCo=data.companies.map(c=>c.id===cid?{...c,contacts:[...(c.contacts||[]),nc],claimedBy:uid,claimDate:new Date().toISOString(),updatedAt:new Date().toISOString()}:c);
    const u={...data,companies:uCo,tasks:newTasks,activity:act};setData(u);sv(u);setJustAdded(newId);setCtForm({name:'',role:'',category:'management',email:'',phone:'',linkedin:'',notes:''});setShowAddCt(false)}
  function handleLinkedInCopy(){const act=logActAtomic(data,uid,'linkedin');const u={...data,activity:act};setData(u);sv(u)}

  function handleSent(ct,_taskId,wasFU){
    const act=logActAtomic(data,uid,'email');
    const newStatus=(company.status==='prospect')?'contacted':company.status;
    const uCo=data.companies.map(c=>{if(c.id!==cid)return c;return{...c,status:newStatus,claimedBy:uid,claimDate:new Date().toISOString(),updatedAt:new Date().toISOString(),contacts:c.contacts.map(x=>x.id===ct.id?{...x,contacted:true,contactMethod:'email',contactDate:td(),lastContactDate:td()}:x)}});
    let uT=[...data.tasks];
    // Mark any open email/followup task for this contact done
    uT=uT.map(t=>(t.contactId===ct.id&&t.userId===uid&&!t.completed&&(t.type==='email'||t.type==='followup'))?{...t,completed:true,completedDate:new Date().toISOString()}:t);
    // Only queue follow-up if this was the initial email (email 1)
    if(!wasFU){
      uT.push({id:gid(),companyId:company.id,contactId:ct.id,userId:uid,type:'followup',description:`Follow up with ${ct.name} at ${company.name}`,dueDate:fd(4),completed:false,createdAt:new Date().toISOString()});
    }
    const u={...data,companies:uCo,tasks:uT,activity:act};setData(u);sv(u);setEmailM(null);
  }

  function handleCall(ct,outcome,notes){
    const log={id:gid(),companyId:company.id,contactId:ct.id,contactName:ct.name,companyName:company.name,outcome,notes,userId:uid,date:new Date().toISOString()};
    const act=logActAtomic(data,uid,'call');
    const newStatus=(company.status==='prospect')?'contacted':company.status;

        </div>

    {/* LinkedIn Connect Modal */}
    {liM&&<div className="mo" onClick={()=>setLiM(null)}><div className="ml" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>

      <div style={{fontSize:12,color:'var(--tm)',marginBottom:16}}>{liM.role} at {company.name}</div>

    </div></div>}

    {showAddCt&&<div className="mo" onClick={()=>setShowAddCt(false)}><div className="ml" onClick={e=>e.stopPropagation()}><h3>Add Decision Maker</h3><p style={{fontSize:12,color:'var(--tm)',marginBottom:4}}>Adding as <strong style={{color:USERS[uid].color}}>{USERS[uid].name}</strong></p><p style={{fontSize:11,color:'var(--blue)',marginBottom:16}}>Contacts at same company spaced 2 weeks apart.</p><div className="fr"><div className="fg"><label>Full Name</label><input value={ctForm.name} onChange={e=>setCtForm({...ctForm,name:e.target.value})} placeholder="John Smith" autoFocus/></div><div className="fg"><label>Job Title</label><input value={ctForm.role} onChange={e=>setCtForm({...ctForm,role:e.target.value})} placeholder="Managing Director"/></div></div><div className="fg"><label>Category</label><select value={ctForm.category} onChange={e=>setCtForm({...ctForm,category:e.target.value})}>{CATS.map(c=><option key={c.v} value={c.v}>{c.l} ({c.d})</option>)}</select></div><div className="fr3"><div className="fg"><label>Email</label><input value={ctForm.email} onChange={e=>setCtForm({...ctForm,email:e.target.value})} placeholder="name@co.com"/></div><div className="fg"><label>Phone</label><input value={ctForm.phone} onChange={e=>setCtForm({...ctForm,phone:e.target.value})} placeholder="+44..."/></div><div className="fg"><label>LinkedIn</label><input value={ctForm.linkedin} onChange={e=>setCtForm({...ctForm,linkedin:e.target.value})} placeholder="linkedin.com/in/..."/></div></div><div className="fg"><label>Notes</label><textarea value={ctForm.notes} onChange={e=>setCtForm({...ctForm,notes:e.target.value})} placeholder="Background..." style={{minHeight:60}}/></div><div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}><button className="bs" onClick={()=>setShowAddCt(false)}>Cancel</button><button className="bp" onClick={addCt}>Save & Queue Outreach</button></div></div></div>}
    {emailM&&<EmailModal contact={emailM.contact} company={company} data={data} setData={setData} isFollowUp={emailM.isFollowUp} emailCount={emailM.emailCount||0} onClose={()=>setEmailM(null)} onSent={handleSent} uid={uid}/>}
    {callM&&<CallModal contact={callM} company={company} onClose={()=>setCallM(null)} onSave={handleCall}/>}
  </div>);
}

function TaskList({data,setData,setView,setSel,uid}){
  const [filter,setFilter]=useState('open');const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({companyId:'',type:'followup',description:'',dueDate:''});
  const tasks=data.tasks.filter(t=>t.userId===uid).filter(t=>{if(filter==='open')return!t.completed;if(filter==='completed')return t.completed;if(filter==='overdue')return!t.completed&&isOD(t.dueDate);if(filter==='calls')return!t.completed&&t.type==='call';if(filter==='emails')return!t.completed&&(t.type==='email'||t.type==='followup');return true}).sort((a,b)=>{if(a.completed!==b.completed)return a.completed?1:-1;return new Date(a.dueDate)-new Date(b.dueDate)});
  return(<div className="fi">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}><h2 style={{fontSize:22,fontWeight:300}}><span style={{color:'var(--amber)'}} className="mono">◇</span> Tasks</h2><button className="bp" onClick={()=>setShowAdd(true)}>+ Add Task</button></div>
    <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>{['open','overdue','calls','emails','completed','all'].map(f=><button key={f} className={filter===f?'bp':'bs'} style={{textTransform:'capitalize'}} onClick={()=>setFilter(f)}>{f}{f==='overdue'&&` (${data.tasks.filter(t=>t.userId===uid&&!t.completed&&isOD(t.dueDate)).length})`}</button>)}</div>
    <div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10}}>
      {tasks.length===0&&<div style={{padding:32,textAlign:'center',color:'var(--tm)',fontSize:13}}>No tasks</div>}
      {tasks.map(t=>{const co=data.companies.find(c=>c.id===t.companyId);return(
        <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:'1px solid var(--bd)',opacity:t.completed?.5:1}}>
          <input type="checkbox" checked={t.completed} onChange={()=>{const u={...data,tasks:data.tasks.map(x=>x.id===t.id?{...x,completed:!x.completed}:x)};setData(u);sv(u)}} style={{width:16,height:16,cursor:'pointer'}}/>
          <span style={{fontSize:16,color:t.type==='call'?'var(--green)':t.type==='email'?'var(--blue)':'var(--purple)'}}>{t.type==='call'?'☎':t.type==='email'?'✉':'◇'}</span>
          {co&&<span className="badge" style={{cursor:'pointer',color:'var(--amber)',background:'var(--amber)18'}} onClick={()=>{addRecent(co.id,co.name);setSel(co.id);setView('companyDetail')}}>{co.name}</span>}
          <span style={{flex:1,fontSize:13,textDecoration:t.completed?'line-through':'none'}}>{t.description}</span>
          <span className="mono" style={{fontSize:11,color:isOD(t.dueDate)?'var(--red)':'var(--tm)'}}>{t.dueDate}</span>
          <button className="bd bx" onClick={()=>{const u={...data,tasks:data.tasks.filter(x=>x.id!==t.id)};setData(u);sv(u)}}>✕</button>
        </div>)})}
    </div>
    {showAdd&&<div className="mo" onClick={()=>setShowAdd(false)}><div className="ml" onClick={e=>e.stopPropagation()}><h3>Add Task</h3><div className="fg"><label>Company</label><select value={form.companyId} onChange={e=>setForm({...form,companyId:e.target.value})}><option value="">— None —</option>{data.companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div><div className="fr"><div className="fg"><label>Type</label><select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}><option value="email">Email</option><option value="call">Call</option><option value="followup">Follow-up</option></select></div><div className="fg"><label>Due Date</label><input type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})}/></div></div><div className="fg"><label>Description</label><input value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="What needs doing?"/></div><div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}><button className="bs" onClick={()=>setShowAdd(false)}>Cancel</button><button className="bp" onClick={()=>{if(!form.description.trim()||!form.dueDate)return;const u={...data,tasks:[...data.tasks,{id:gid(),...form,userId:uid,completed:false,createdAt:new Date().toISOString()}]};setData(u);sv(u);setForm({companyId:'',type:'followup',description:'',dueDate:''});setShowAdd(false)}}>Add</button></div></div></div>}
  </div>);
}

function TrackRecord({data,setData}){const [s,setS]=useState(false);
  return(<div className="fi"><h2 style={{fontSize:22,fontWeight:300,marginBottom:8}}><span style={{color:'var(--amber)'}} className="mono">▣</span> Track Record</h2><p style={{color:'var(--t2)',fontSize:13,marginBottom:8,maxWidth:600}}>Your background. AI uses this to personalise emails.</p><p style={{color:'var(--amber)',fontSize:12,marginBottom:24,maxWidth:600,background:'var(--amberd)33',padding:'8px 12px',borderRadius:6}}>⚠ Client names automatically anonymised in AI emails.</p><div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10,padding:20}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}><div className="sh" style={{color:'var(--amber)',marginBottom:0}}>YOUR BACKGROUND</div>{s&&<span className="mono" style={{fontSize:11,color:'var(--green)'}}>SAVED ✓</span>}</div><textarea value={data.trackRecord||''} onChange={e=>{const u={...data,trackRecord:e.target.value};setData(u);sv(u);setS(true);setTimeout(()=>setS(false),1000)}} style={{minHeight:400,fontSize:13,lineHeight:1.7}}/></div></div>)}

function JobsView({data,setData,setView,setSel,uid}){
  const [search,setSearch]=useState('');const [fCompany,setFCompany]=useState('');const [fLevel,setFLevel]=useState('');const [fType,setFType]=useState('');const [fCountry,setFCountry]=useState('');
  const allJobs=[];
  data.companies.forEach(co=>{
    if(!co.activeJobsRaw||!Array.isArray(co.activeJobsRaw))return;
    co.activeJobsRaw.forEach((role,idx)=>{allJobs.push({...role,_coId:co.id,_coName:co.name,_coCountry:co.country,_coSector:co.sector||'',_coStatus:co.status,_coJobsUrl:co.jobsUrl||'',_coChecked:co.jobsCheckedDate||'',_coHiringNotes:co.hiringNotes||'',_idx:idx,_key:co.id+'_'+idx})});
  });
  const hiringCompanies=data.companies.filter(c=>c.activeJobCount>0);
  const totalRoles=allJobs.length;
  const clearedRoles=allJobs.filter(j=>{const t=(j.title||'').toLowerCase();return t.includes(' sc ')||t.includes(' dv ')||t.includes('cleared')||t.includes('clearance')||t.includes('security clear')}).length;
  const engRoles=allJobs.filter(j=>j.type==='engineering').length;
  const leaderRoles=allJobs.filter(j=>j.type==='leadership').length;
  const filtered=allJobs.filter(j=>{
    if(search){const s=search.toLowerCase();if(!(j.title||'').toLowerCase().includes(s)&&!j._coName.toLowerCase().includes(s)&&!(j.source||'').toLowerCase().includes(s)&&!j._coSector.toLowerCase().includes(s))return false}
    if(fCompany&&j._coId!==fCompany)return false;
    if(fLevel&&j.level!==fLevel)return false;
    if(fType&&j.type!==fType)return false;
    if(fCountry&&j._coCountry!==fCountry)return false;
    return true;
  });
  const [viewMode,setViewMode]=useState('list');
  const byCompany={};filtered.forEach(j=>{if(!byCompany[j._coId])byCompany[j._coId]={co:data.companies.find(c=>c.id===j._coId),roles:[]};byCompany[j._coId].roles.push(j)});
  const companyGroups=Object.values(byCompany).sort((a,b)=>b.roles.length-a.roles.length);
  const countries=[...new Set(data.companies.map(c=>c.country))].sort();
  const levels=[...new Set(allJobs.map(j=>j.level).filter(Boolean))].sort();
  const types=[...new Set(allJobs.map(j=>j.type).filter(Boolean))].sort();
  const levelColors={senior:'#a78bfa',mid:'#60a5fa',junior:'#6ee7b7',lead:'#f59e0b',director:'#f472b6',executive:'#ef4444',principal:'#22d3ee'};
  const typeColors={engineering:'var(--blue)',leadership:'var(--amber)',sales:'var(--green)',hr:'var(--purple)',other:'var(--tm)'};
  return(<div className="fi">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <h2 style={{fontSize:22,fontWeight:300}}><span style={{color:'var(--green)'}} className="mono">⧉</span> Jobs Board <span className="mono" style={{fontSize:13,color:'var(--tm)',marginLeft:8}}>{totalRoles} roles across {hiringCompanies.length} companies</span></h2>
    </div>
    <div className="job-stats-row">
      <div className="job-stat" style={{borderTop:'2px solid var(--green)'}}><div className="mono" style={{fontSize:20,fontWeight:700,color:'var(--green)'}}>{totalRoles}</div><div className="mono" style={{fontSize:10,color:'var(--tm)',letterSpacing:1,marginTop:2}}>TOTAL ROLES</div></div>
      <div className="job-stat" style={{borderTop:'2px solid var(--amber)'}}><div className="mono" style={{fontSize:20,fontWeight:700,color:'var(--amber)'}}>{hiringCompanies.length}</div><div className="mono" style={{fontSize:10,color:'var(--tm)',letterSpacing:1,marginTop:2}}>COMPANIES HIRING</div></div>
      <div className="job-stat" style={{borderTop:'2px solid var(--blue)'}}><div className="mono" style={{fontSize:20,fontWeight:700,color:'var(--blue)'}}>{engRoles}</div><div className="mono" style={{fontSize:10,color:'var(--tm)',letterSpacing:1,marginTop:2}}>ENGINEERING</div></div>
      <div className="job-stat" style={{borderTop:'2px solid var(--purple)'}}><div className="mono" style={{fontSize:20,fontWeight:700,color:'var(--purple)'}}>{leaderRoles}</div><div className="mono" style={{fontSize:10,color:'var(--tm)',letterSpacing:1,marginTop:2}}>LEADERSHIP</div></div>
      <div className="job-stat" style={{borderTop:'2px solid #22d3ee'}}><div className="mono" style={{fontSize:20,fontWeight:700,color:'#22d3ee'}}>{clearedRoles}</div><div className="mono" style={{fontSize:10,color:'var(--tm)',letterSpacing:1,marginTop:2}}>CLEARED ROLES</div></div>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
      <input placeholder="Search roles, companies, sectors..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:340,flex:1}}/>
      <select value={fCompany} onChange={e=>setFCompany(e.target.value)} style={{maxWidth:180}}><option value="">All Companies</option>{hiringCompanies.sort((a,b)=>a.name.localeCompare(b.name)).map(c=><option key={c.id} value={c.id}>{c.name} ({c.activeJobCount})</option>)}</select>
      <select value={fCountry} onChange={e=>setFCountry(e.target.value)} style={{maxWidth:120}}><option value="">All Countries</option>{countries.map(c=><option key={c} value={c}>{c}</option>)}</select>
      <select value={fLevel} onChange={e=>setFLevel(e.target.value)} style={{maxWidth:120}}><option value="">All Levels</option>{levels.map(l=><option key={l} value={l}>{l}</option>)}</select>
      <select value={fType} onChange={e=>setFType(e.target.value)} style={{maxWidth:140}}><option value="">All Types</option>{types.map(t=><option key={t} value={t}>{t}</option>)}</select>
      <span className="mono" style={{fontSize:12,color:'var(--tm)',alignSelf:'center'}}>{filtered.length} result{filtered.length!==1?'s':''}</span>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:16}}>
      <button className={viewMode==='list'?'bp':'bs'} style={{padding:'4px 12px',fontSize:12}} onClick={()=>setViewMode('list')}>All Roles</button>
      <button className={viewMode==='grouped'?'bp':'bs'} style={{padding:'4px 12px',fontSize:12}} onClick={()=>setViewMode('grouped')}>By Company</button>
    </div>
    {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'var(--tm)',fontSize:14,background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10}}>{allJobs.length===0?'No job data found.':'No roles match your filters.'}</div>}
    {viewMode==='list'&&filtered.map(j=>{
      const lc=levelColors[j.level]||'var(--tm)';const tc=typeColors[j.type]||'var(--tm)';
      return(<div key={j._key} className="job-card">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{j.title||'Untitled Role'}</div>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--t2)'}}>
              <span style={{color:'var(--amber)',cursor:'pointer',fontWeight:500}} onClick={()=>{addRecent(j._coId,j._coName);setSel(j._coId);setView('companyDetail')}}>{j._coName}</span>
              <span style={{color:'var(--tm)'}}>·</span><span className="mono" style={{fontSize:11,color:'var(--tm)'}}>{j._coCountry}</span>
              {j._coSector&&<><span style={{color:'var(--tm)'}}>·</span><span style={{color:'var(--tm)'}}>{j._coSector}</span></>}
            </div>
          </div>
          <div style={{textAlign:'right',whiteSpace:'nowrap'}}>{j._coChecked&&<div className="mono" style={{fontSize:10,color:'var(--tm)'}}>Checked {j._coChecked}</div>}</div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8,alignItems:'center'}}>
          {j.level&&<span className="job-tag" style={{color:lc,background:lc+'18'}}>{j.level}</span>}
          {j.type&&<span className="job-tag" style={{color:tc,background:(tc.startsWith('var')?'var(--bg2)':tc+'18')}}>{j.type}</span>}
          {j.source&&<span className="job-tag" style={{color:'var(--t2)',background:'var(--bg2)',fontSize:9}}>{j.source}</span>}
          {(()=>{const t=(j.title||'').toLowerCase();if(t.includes(' dv ')||t.includes('(dv)'))return<span className="job-tag" style={{color:'#f472b6',background:'#f472b618'}}>DV</span>;if(t.includes(' sc ')||t.includes('(sc)')||t.includes('sc cleared'))return<span className="job-tag" style={{color:'#22d3ee',background:'#22d3ee18'}}>SC</span>;if(t.includes('clearance')||t.includes('cleared'))return<span className="job-tag" style={{color:'#94a3b8',background:'#94a3b818'}}>Cleared</span>;return null})()}
          {j._coJobsUrl&&<a href={j._coJobsUrl} target="_blank" onClick={e=>e.stopPropagation()} className="job-tag" style={{color:'var(--blue)',background:'var(--blued)',textDecoration:'none',cursor:'pointer'}}>Careers ↗</a>}
        </div>
      </div>);
    })}
    {viewMode==='grouped'&&companyGroups.map(g=>{
      const co=g.co;if(!co)return null;
      return(<div key={co.id} style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10,padding:16,marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'var(--amber)',fontWeight:600,fontSize:15,cursor:'pointer'}} onClick={()=>{addRecent(co.id,co.name);setSel(co.id);setView('companyDetail')}}>{co.name}</span>
            <span className="mono" style={{fontSize:11,color:'var(--tm)'}}>{co.country}</span>
            {co.sector&&<span className="badge" style={{color:'var(--t2)',background:'var(--bg2)',fontSize:9}}>{co.sector}</span>}
            <SB status={co.status}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>{g.roles.length} role{g.roles.length!==1?'s':''}</span>
            {co.jobsUrl&&<a href={co.jobsUrl} target="_blank" className="job-tag" style={{color:'var(--blue)',background:'var(--blued)',textDecoration:'none',cursor:'pointer',fontSize:10}}>Careers ↗</a>}
          </div>
        </div>
        {co.hiringNotes&&<div style={{fontSize:12,color:'var(--t2)',marginBottom:8,padding:'6px 10px',background:'var(--bg2)',borderRadius:6,borderLeft:'3px solid var(--green)'}}>{co.hiringNotes}</div>}
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {g.roles.map((r,i)=>{const lc=levelColors[r.level]||'var(--tm)';return<div key={i} style={{padding:'6px 10px',background:'var(--bg2)',borderRadius:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:500}}>{r.title}</span>{r.level&&<span className="job-tag" style={{color:lc,background:lc+'18',fontSize:9,padding:'1px 5px'}}>{r.level}</span>}</div>})}
        </div>
        {co.jobsCheckedDate&&<div className="mono" style={{fontSize:9,color:'var(--tm)',marginTop:8}}>Last checked: {co.jobsCheckedDate}</div>}
      </div>);
    })}
  </div>);
}

      <p style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>{syncStatus==='synced'?'Connected — changes sync in real-time between all users.':syncStatus==='error'?'Sync error — changes saved locally. Will retry.':'Connecting to Firebase...'}</p>
      <div className="mono" style={{fontSize:11,color:syncStatus==='synced'?'var(--green)':'var(--amber)'}}>{syncStatus==='synced'?'● SYNCED':'⚠ '+syncStatus.toUpperCase()}</div>
    </div>
    <div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10,padding:20,marginBottom:20}}>
      <div className="sh" style={{color:'var(--amber)'}}>🔑 SHARED PASSCODE</div>
      <p style={{fontSize:12,color:'var(--t2)',marginBottom:12}}>Both users must use the same passcode to share one workspace.</p>
      <div style={{display:'flex',gap:8}}>
        <input value={room} onChange={e=>setRoom(e.target.value)} placeholder="river-quartz-fjord-7040" style={{flex:1}}/>
        <button className="bp" onClick={()=>{const v=(room||'').trim();if(!v){alert('Enter a passcode');return;}try{localStorage.setItem('recon_room',v);location.reload();}catch(e){alert('Could not save passcode');}}}>Use</button>
      </div>
    </div>
    <div style={{background:'var(--bgc)',border:'1px solid var(--bd)',borderRadius:10,padding:20}}>
      <div className="sh" style={{color:'var(--amber)'}}>DATA</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="bs" onClick={()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`recon-${td()}.json`;a.click()}}>↓ Export JSON</button>
        <button className="bs" onClick={()=>exportCSV(data)}>↓ Export CSV</button>
        <label className="bs" style={{display:'inline-flex',alignItems:'center',cursor:'pointer'}}>↑ Import<input type="file" accept=".json" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.companies){const m=migrateData(d);setData(m);sv(m);setKey(m.settings?.apiKey||'');alert('Done!')}}catch{alert('Error')}};r.readAsText(f)}} style={{display:'none'}}/></label>
        <button className="bd" onClick={()=>{if(confirm('Delete ALL?')&&confirm('Sure?')){const f={companies:[],tasks:[],trackRecord:'',callLog:[],activity:{stephen:{},thomas:{}},settings:{apiKey:data.settings?.apiKey},_version:3};setData(f);sv(f)}}}>⚠ Clear</button>
        <button className="bs" onClick={async()=>{if(confirm('Reset to seed?')){localStorage.removeItem(SK);const f=await lds();const m=migrateData(f);setData(m);sv(m);setKey(m.settings?.apiKey||'')}}}>↺ Reset</button>
      </div>
    </div>
  </div>);
}

function App(){
  const [data,setData]=useState(null);const [loading,setLoading]=useState(true);const [view,setView]=useState('actions');const [sel,setSel]=useState(null);
  const [syncStatus,setSyncStatus]=useState('connecting');
  const [uid,setUid]=useState(()=>localStorage.getItem('recon_uid')||'stephen');
  const dataRef=useRef(null);
  useEffect(()=>{window.__reconSetSyncStatus=setSyncStatus;return()=>{delete window.__reconSetSyncStatus}},[]);
  function setUidPersist(id){setUid(id);localStorage.setItem('recon_uid',id)}
  useEffect(()=>{
    async function init(){
      let d=await loadFromFirebase();
      if(!d){d=ld();if(d)setSyncStatus('local')}
      if(!d){d=await lds();setSyncStatus('fresh')}
      const m=migrateData(d);m.callLog=m.callLog||[];
      m.settings.apiKey=localStorage.getItem('recon_apikey')||m.settings?.apiKey||'';
      dataRef.current=m;setData(m);sv(m);setLoading(false);
    }
    init();
    const unsub=dbRef.on('value',snap=>{
      if(_skipNextSync){_skipNextSync=false;return}
      const d=snap.val();
      if(d&&d.companies&&d.companies.length>0){
        d.companies=d.companies.filter(Boolean);
        d.callLog=d.callLog||[];d.activity=d.activity||{};d.tasks=d.tasks||[];d.settings=d.settings||{apiKey:''};d.trackRecord=d.trackRecord||'';
        d.settings.apiKey=localStorage.getItem('recon_apikey')||'';
        const m=migrateData(d);
        dataRef.current=m;setData(m);
        try{localStorage.setItem(SK,JSON.stringify(m))}catch(e){}
        setSyncStatus('synced');
      }
    },err=>{setSyncStatus('error');console.error('Firebase listener error:',err);});
    return()=>dbRef.off('value',unsub);
  },[]);
  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg0)'}}><div style={{textAlign:'center'}}><div className="mono" style={{fontSize:24,color:'var(--amber)',letterSpacing:4,marginBottom:12}}>▣ RECON</div><div style={{color:'var(--tm)',fontSize:13}}>Connecting to Firebase...</div></div></div>;
  if(!data)return null;
  const ac=data.tasks.filter(t=>!t.completed&&t.userId===uid&&(isOD(t.dueDate)||isT(t.dueDate)||isS(t.dueDate))).length;
  const rv=()=>{switch(view){
    case'actions':return<DailyActions data={data} setData={setData} setView={setView} setSel={setSel} uid={uid}/>;
    case'companies':return<CompanyList data={data} setData={setData} setView={setView} setSel={setSel} uid={uid}/>;
    case'jobs':return<JobsView data={data} setData={setData} setView={setView} setSel={setSel} uid={uid}/>;
    case'contacts':return<ContactsView data={data} setView={setView} setSel={setSel} uid={uid}/>;
    case'companyDetail':return<CompanyDetail cid={sel} data={data} setData={setData} setView={setView} uid={uid}/>;
    case'tasks':return<TaskList data={data} setData={setData} setView={setView} setSel={setSel} uid={uid}/>;
    case'trackrecord':return<TrackRecord data={data} setData={setData}/>;
    case'settings':return<Settings data={data} setData={setData} syncStatus={syncStatus}/>;
    default:return<DailyActions data={data} setData={setData} setView={setView} setSel={setSel} uid={uid}/>}};
  return<div style={{display:'flex',minHeight:'100vh'}}><Sidebar view={view} setView={setView} ac={ac} syncStatus={syncStatus} uid={uid} setUid={setUidPersist}/><main style={{marginLeft:220,flex:1,padding:'32px 40px',maxWidth:1200}}>{rv()}</main></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
